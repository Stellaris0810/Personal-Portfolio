<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:#fff;font-family:var(--font-body);padding:24px 30px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--border-1)}
  .chip{height:64px}
  .cap{padding:7px 10px;background:#fff;border-top:1px solid var(--border-1)}
  .nm{font-size:12px;font-weight:700;color:var(--color-neutral)}
  .hx{font-size:10px;color:var(--fg-3);font-weight:500;margin-top:2px}
</style>
</head>
<body>
  <div class="meta">Semantic Surfaces &amp; Borders</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#FCF9F8"></div><div class="cap"><div class="nm">Page bg</div><div class="hx">#FCF9F8</div></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="cap"><div class="nm">Raised</div><div class="hx">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5F5F1"></div><div class="cap"><div class="nm">Sunken</div><div class="hx">#F5F5F1</div></div></div>
    <div class="sw"><div class="chip" style="background:#ECE0DC"></div><div class="cap"><div class="nm">Nav fill</div><div class="hx">#ECE0DC</div></div></div>
    <div class="sw"><div class="chip" style="background:#B3A9A5"></div><div class="cap"><div class="nm">Border 2</div><div class="hx">#B3A9A5</div></div></div>
    <div class="sw"><div class="chip" style="background:#D7CCC8"></div><div class="cap"><div class="nm">Tag fill</div><div class="hx">#D7CCC8</div></div></div>
    <div class="sw"><div class="chip" style="background:#5D4037"></div><div class="cap"><div class="nm">Accent</div><div class="hx">#5D4037</div></div></div>
    <div class="sw"><div class="chip" style="background:#2C2C2C"></div><div class="cap"><div class="nm">Ink</div><div class="hx">#2C2C2C</div></div></div>
  </div>
</body>
</html>
