<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);padding:24px 30px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:16px}
  .ramp{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--border-1)}
  .stop{flex:1;height:60px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:6px;font-size:10px;font-weight:600}
  .labels{display:flex;margin-top:6px}
  .labels span{flex:1;text-align:left;font-size:10px;color:var(--fg-3);letter-spacing:.02em}
</style>
</head>
<body>
  <div class="meta">Neutral — Warm-Grey Ramp</div>
  <div class="ramp">
    <div class="stop" style="background:#1C1C1C;color:#fff">900</div>
    <div class="stop" style="background:#2C2C2C;color:#fff">800</div>
    <div class="stop" style="background:#44413F;color:#fff">700</div>
    <div class="stop" style="background:#5E5A57;color:#fff">600</div>
    <div class="stop" style="background:#807A76;color:#fff">500</div>
    <div class="stop" style="background:#A8A19C;color:#1C1C1C">400</div>
    <div class="stop" style="background:#C9C2BD;color:#1C1C1C">300</div>
    <div class="stop" style="background:#E4DEDA;color:#2C2C2C">200</div>
    <div class="stop" style="background:#F1ECE9;color:#2C2C2C">100</div>
    <div class="stop" style="background:#FCF9F8;color:#2C2C2C">50</div>
  </div>
  <div class="labels"><span>800 = Neutral ink · 50 = Page background</span></div>
</body>
</html>
