<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);padding:26px 30px;display:flex;align-items:center;justify-content:space-between;gap:24px}
  .wm{font-family:var(--font-brand);font-style:italic;color:var(--color-primary);font-size:40px;letter-spacing:.02em}
  .swatches{display:flex;gap:0;border-radius:6px;overflow:hidden;border:1px solid var(--border-1)}
  .sw{width:44px;height:44px}
  .panel{text-align:right}
  .cap{font-size:11px;color:var(--fg-3);margin-top:8px;letter-spacing:.04em}
</style>
</head>
<body>
  <div class="wm">Stellaris's Web</div>
  <div class="panel">
    <div class="swatches">
      <div class="sw" style="background:#5D4037"></div>
      <div class="sw" style="background:#D7CCC8"></div>
      <div class="sw" style="background:#ECE0DC"></div>
      <div class="sw" style="background:#FCF9F8"></div>
    </div>
    <div class="cap">Playfair Display Italic · primary brown</div>
  </div>
</body>
</html>
