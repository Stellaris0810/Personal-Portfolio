<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Playfair+Display:ital@1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);color:var(--fg-1);padding:26px 30px}
  .row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600}
  .big{font-family:var(--font-display);font-weight:800;font-size:72px;line-height:1;letter-spacing:.01em;color:var(--color-neutral)}
  .specimen{font-family:var(--font-display);font-weight:700;font-size:23px;color:var(--color-neutral);margin-top:14px;letter-spacing:.02em}
</style>
</head>
<body>
  <div class="row">
    <span class="meta">Display · Headline</span>
    <span class="meta">Hanken Grotesk · 700 / 800</span>
  </div>
  <div class="big">Aa 你好</div>
  <div class="specimen">你好，我是黃偉綸 — 前端設計學習者</div>
</body>
</html>
