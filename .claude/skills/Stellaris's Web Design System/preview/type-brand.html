<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Playfair+Display:ital@1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);color:var(--fg-1);padding:26px 30px}
  .row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600}
  .wordmark{font-family:var(--font-brand);font-style:italic;font-size:46px;color:var(--color-primary);letter-spacing:.02em;line-height:1.4}
  .note{font-family:var(--font-body);font-weight:400;font-size:13px;color:var(--fg-3);margin-top:6px}
</style>
</head>
<body>
  <div class="row">
    <span class="meta">Brand · Wordmark</span>
    <span class="meta">Playfair Display · Italic</span>
  </div>
  <div class="wordmark">Stellaris's Web</div>
  <div class="note">Used only for the wordmark — never for body or headings.</div>
</body>
</html>
