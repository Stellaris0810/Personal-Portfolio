<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Playfair+Display:ital@1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);color:var(--fg-1);padding:26px 30px}
  .row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600}
  p{font-family:var(--font-body);font-weight:300;font-size:16px;line-height:2;letter-spacing:.02em;color:var(--fg-2);margin:0;max-width:600px}
  .em{color:var(--color-primary);font-weight:600}
</style>
</head>
<body>
  <div class="row">
    <span class="meta">Body · UI · Label</span>
    <span class="meta">Manrope · 300 / 500</span>
  </div>
  <p>Hi，我的名字是<span class="em">黃偉綸</span>，畢業於資工系，目前是前端設計學習者。透過了解使用者的需求，設計出合理且吸引人的 UI/UX 介面，將設計與 Vue.js 精準融合。</p>
</body>
</html>
