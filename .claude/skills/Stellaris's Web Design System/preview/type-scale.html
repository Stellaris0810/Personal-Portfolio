<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Playfair+Display:ital@1&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);color:var(--fg-1);padding:22px 30px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:14px}
  .scale{display:flex;flex-direction:column;gap:10px}
  .line{display:flex;align-items:baseline;gap:18px}
  .tok{font-family:var(--font-body);font-size:11px;color:var(--fg-3);width:108px;flex:none;letter-spacing:.04em}
  .samp{font-family:var(--font-display);color:var(--color-neutral);font-weight:700;line-height:1;white-space:nowrap}
</style>
</head>
<body>
  <div class="meta">Type Scale · Hanken Grotesk</div>
  <div class="scale">
    <div class="line"><span class="tok">display · 60</span><span class="samp" style="font-size:42px;font-weight:800">黃偉綸 Aa</span></div>
    <div class="line"><span class="tok">h1 · 40</span><span class="samp" style="font-size:34px">作品集 Aa</span></div>
    <div class="line"><span class="tok">h2 · 24</span><span class="samp" style="font-size:24px;color:var(--color-primary)">我的技能 Aa</span></div>
    <div class="line"><span class="tok">h3 · 20</span><span class="samp" style="font-size:20px">專案名稱 Aa</span></div>
    <div class="line"><span class="tok">body · 16</span><span class="samp" style="font-size:16px;font-family:var(--font-body);font-weight:300">內文段落 Aa</span></div>
    <div class="line"><span class="tok">label · 13</span><span class="samp" style="font-size:13px;font-family:var(--font-body);font-weight:500">標籤 Label</span></div>
  </div>
</body>
</html>
