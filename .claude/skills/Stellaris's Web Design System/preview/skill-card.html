<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);padding:24px 30px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:16px}
  .row{display:flex;gap:18px}
  .card{width:150px;background:#fff;border:1px solid var(--border-1);border-radius:4px;padding:26px 0 18px;display:flex;flex-direction:column;align-items:center;gap:14px}
  .card i{font-size:48px;color:var(--color-neutral)}
  .nm{font-size:16px;color:var(--color-neutral);font-weight:500}
  .stars{color:var(--color-primary);font-size:13px;letter-spacing:3px}
</style>
</head>
<body>
  <div class="meta">Skill Card — Devicon + rating</div>
  <div class="row">
    <div class="card"><i class="devicon-html5-plain"></i><div class="nm">HTML5</div><div class="stars">★★★★★</div></div>
    <div class="card"><i class="devicon-css3-plain"></i><div class="nm">CSS</div><div class="stars">★★★★★</div></div>
    <div class="card"><i class="devicon-javascript-plain"></i><div class="nm">JavaScript</div><div class="stars">★★★★★</div></div>
    <div class="card"><i class="devicon-vuejs-plain"></i><div class="nm">Vue.js</div><div class="stars">★★★★★</div></div>
  </div>
</body>
</html>
