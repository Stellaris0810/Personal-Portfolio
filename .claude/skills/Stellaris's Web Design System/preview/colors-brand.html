<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);padding:24px 30px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:16px}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .sw{border-radius:8px;overflow:hidden;border:1px solid var(--border-1)}
  .chip{height:78px}
  .cap{padding:8px 10px;background:#fff}
  .nm{font-size:13px;font-weight:700;color:var(--color-neutral)}
  .hx{font-size:11px;color:var(--fg-3);font-weight:500;margin-top:2px;letter-spacing:.03em}
</style>
</head>
<body>
  <div class="meta">Brand Core Palette</div>
  <div class="grid">
    <div class="sw"><div class="chip" style="background:#5D4037"></div><div class="cap"><div class="nm">Primary</div><div class="hx">#5D4037</div></div></div>
    <div class="sw"><div class="chip" style="background:#D7CCC8"></div><div class="cap"><div class="nm">Secondary</div><div class="hx">#D7CCC8</div></div></div>
    <div class="sw"><div class="chip" style="background:#F5F5F1"></div><div class="cap"><div class="nm">Tertiary</div><div class="hx">#F5F5F1</div></div></div>
    <div class="sw"><div class="chip" style="background:#2C2C2C"></div><div class="cap"><div class="nm">Neutral</div><div class="hx">#2C2C2C</div></div></div>
  </div>
</body>
</html>
