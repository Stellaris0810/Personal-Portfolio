<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-bg);font-family:var(--font-body);padding:26px 30px}
  .meta{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg-3);font-weight:600;margin-bottom:24px}
  .row{display:flex;gap:34px;align-items:flex-start}
  .item{display:flex;flex-direction:column;align-items:center;gap:12px}
  .box{width:120px;height:64px;background:#fff;border-radius:10px}
  .nm{font-size:12px;font-weight:700;color:var(--color-neutral)}
  .px{font-size:10px;color:var(--fg-3);text-align:center;max-width:130px}
  .navline{box-shadow:var(--shadow-nav);border-radius:0}
</style>
</head>
<body>
  <div class="meta">Elevation — warm brown-tinted shadows</div>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="nm">sm</div><div class="px">cards at rest</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="nm">md</div><div class="px">raised cards</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="nm">lg</div><div class="px">floating links</div></div>
    <div class="item"><div class="box navline"></div><div class="nm">nav</div><div class="px">1px hairline<br>#B3A9A5</div></div>
  </div>
</body>
</html>
