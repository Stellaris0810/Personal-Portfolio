<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <script>
      // Restore path redirected by 404.html (GitHub Pages SPA routing)
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded[0] +
            (decoded[1] ? '?' + decoded[1] : '') + l.hash
          );
        }
      }(window.location));
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellaris's Web</title>
    <meta name="description" content="黃偉綸的個人作品集網站——前端設計學習者，將 UI/UX 設計與 Vue.js、JavaScript 精準融合，打造生動且有趣的網站。">
